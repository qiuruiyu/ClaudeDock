name: Deploy Pages

# Trigger only when content under docs/ changes (or the workflow itself).
# Plain code-only commits to master no longer trigger a Pages rebuild,
# keeping the deployments list focused on actual site changes.
on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment may run at a time. Don't cancel an
# in-flight deploy if a new push lands — let it finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
